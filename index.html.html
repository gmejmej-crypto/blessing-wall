<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>光明祝福墙 · 广慧本净</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Serif SC',serif;
  min-height:100vh;
  padding-bottom:60px;
  color:#3d2b0e;
  overflow-x:hidden;
  background-color:#f7f2e8;
  background-image:
    radial-gradient(ellipse 80% 35% at 65% 0%,rgba(249,199,79,0.22) 0%,transparent 60%),
    radial-gradient(ellipse 45% 50% at 95% 30%,rgba(244,132,95,0.10) 0%,transparent 55%),
    radial-gradient(ellipse 55% 35% at 5% 70%,rgba(144,190,109,0.08) 0%,transparent 55%),
    repeating-linear-gradient(0deg,transparent,transparent 32px,rgba(180,160,120,0.045) 32px,rgba(180,160,120,0.045) 33px),
    repeating-linear-gradient(90deg,transparent,transparent 32px,rgba(180,160,120,0.03) 32px,rgba(180,160,120,0.03) 33px);
}
.top-stripe{height:3px;background:linear-gradient(90deg,#f4845f,#f9c74f,#90be6d,#43aa8b,#4cc9f0);opacity:0.65;}
.page{position:relative;}
.deco-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;}
.title-section{display:flex;flex-direction:column;align-items:center;padding:24px 20px 0;}
.subtitle{font-family:'Ma Shan Zheng',cursive;font-size:16px;color:#4a6a52;line-height:2.1;text-align:center;padding:8px 24px 12px;letter-spacing:0.06em;}
.sticky-showcase{display:flex;justify-content:center;align-items:flex-end;gap:8px;padding:4px 16px 12px;position:relative;min-height:108px;}
.wave-sep{text-align:center;margin:4px 0 10px;}
.stats{display:flex;margin:0 16px;background:rgba(255,253,240,0.90);border-radius:14px;padding:14px 0;box-shadow:3px 4px 0 rgba(200,150,42,0.12);border:1.5px solid rgba(200,150,42,0.18);}
.stat-item{flex:1;text-align:center;position:relative;}
.stat-item:not(:last-child)::after{content:'';position:absolute;right:0;top:15%;height:70%;width:1px;background:linear-gradient(180deg,transparent,rgba(200,150,42,0.25),transparent);}
.stat-num{font-family:'Ma Shan Zheng',cursive;font-size:30px;color:#c8962a;display:block;line-height:1.1;}
.stat-lbl{font-size:12px;color:#4a6a52;font-weight:400;letter-spacing:0.12em;margin-top:3px;display:block;}
.flow-section{margin:22px 16px 0;}
.flow-hd{text-align:center;font-family:'Ma Shan Zheng',cursive;font-size:16px;color:#4a6a52;letter-spacing:0.3em;margin-bottom:18px;}
.bless-card{border-radius:10px;padding:20px 18px 16px;margin-bottom:18px;position:relative;transition:transform 0.2s;}
.bless-card:nth-child(odd){transform:rotate(-0.5deg);}
.bless-card:nth-child(even){transform:rotate(0.4deg);}
.bless-card:hover{transform:rotate(0deg) scale(1.01);}
.bless-card:nth-child(3n+1){background:#fffde7;border:1.5px solid rgba(249,199,79,0.4);box-shadow:4px 5px 0 rgba(200,160,40,0.15);}
.bless-card:nth-child(3n+2){background:#f1faf4;border:1.5px solid rgba(144,190,109,0.4);box-shadow:4px 5px 0 rgba(67,170,139,0.13);}
.bless-card:nth-child(3n){background:#fff4ee;border:1.5px solid rgba(244,132,95,0.34);box-shadow:4px 5px 0 rgba(200,100,60,0.12);}
.pin{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:24px;height:24px;}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.card-name{font-family:'Ma Shan Zheng',cursive;font-size:17px;color:#4a3520;}
.card-time{font-size:12px;color:#7a7a6a;font-weight:300;}
.card-body{font-size:15px;color:#3d2b0e;line-height:1.9;font-weight:300;margin-bottom:10px;}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;}
.card-tag{font-size:12px;padding:3px 11px;border-radius:12px;font-family:'Ma Shan Zheng',cursive;}
.bless-card:nth-child(3n+1) .card-tag{background:rgba(249,199,79,0.2);border:1px solid rgba(200,150,40,0.35);color:#6a4c1e;}
.bless-card:nth-child(3n+2) .card-tag{background:rgba(144,190,109,0.2);border:1px solid rgba(80,160,100,0.35);color:#1e5a3a;}
.bless-card:nth-child(3n) .card-tag{background:rgba(244,132,95,0.18);border:1px solid rgba(200,90,60,0.32);color:#6a2a10;}
.loading-text{text-align:center;font-size:14px;color:#6b8f71;font-family:'Noto Serif SC',serif;padding:24px;letter-spacing:0.1em;}
.form-card{margin:22px 16px 0;background:rgba(255,253,240,0.93);border-radius:16px;padding:22px 18px 20px;box-shadow:4px 5px 0 rgba(144,190,109,0.14),2px 2px 0 rgba(249,199,79,0.1);border:1.5px solid rgba(180,160,100,0.22);}
.form-title{text-align:center;font-family:'Ma Shan Zheng',cursive;font-size:17px;color:#4a6a52;letter-spacing:0.3em;margin-bottom:18px;}
.form-label{display:block;font-size:13px;color:#4a5a42;letter-spacing:0.12em;margin-bottom:7px;font-weight:400;}
.form-input,.form-textarea{width:100%;background:rgba(255,255,248,0.78);border:1.5px solid rgba(120,170,120,0.42);border-radius:10px;padding:12px 14px;font-family:'Noto Serif SC',serif;font-size:15px;color:#3d2b0e;outline:none;-webkit-appearance:none;margin-bottom:16px;transition:border-color 0.25s;}
.form-input:focus,.form-textarea:focus{border-color:#6aaa6a;}
.form-input::placeholder,.form-textarea::placeholder{color:#8aaa8a;font-size:14px;}
.form-textarea{height:90px;resize:none;line-height:1.8;}
.tags-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.tag-cb{display:none;}
.tag-lbl{display:inline-block;padding:7px 14px;border-radius:22px;font-size:14px;color:#3a5a42;font-family:'Ma Shan Zheng',cursive;cursor:pointer;transition:all 0.2s;background:rgba(255,255,245,0.88);border:1.5px solid rgba(100,160,110,0.42);box-shadow:1.5px 1.5px 0 rgba(100,160,110,0.18);}
.tag-cb:checked+.tag-lbl{background:linear-gradient(135deg,rgba(120,190,120,0.22),rgba(60,160,120,0.18));border-color:#3a9a6a;color:#1a4a2a;}
.other-input{display:none;width:100%;margin-top:8px;}
.other-input.show{display:block;}
.submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,#f4845f,#f9c74f 60%,#ffd166);border:none;border-radius:12px;color:white;font-family:'Ma Shan Zheng',cursive;font-size:20px;letter-spacing:0.25em;cursor:pointer;transition:all 0.22s;box-shadow:3px 3px 0 rgba(200,100,60,0.28);margin-top:4px;}
.submit-btn:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 rgba(200,100,60,0.24);}
.submit-btn:active{transform:translate(1px,1px);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.success-toast{display:none;text-align:center;padding:12px;background:rgba(144,190,109,0.12);border:1px solid rgba(100,160,100,0.3);border-radius:10px;color:#2d6a4f;font-size:14px;font-family:'Noto Serif SC',serif;margin-top:12px;letter-spacing:0.05em;}
.success-toast.show{display:block;animation:fadeIn 0.4s ease;}
.error-msg{display:none;text-align:center;font-size:13px;color:#c0392b;font-family:'Noto Serif SC',serif;margin-top:8px;}
.error-msg.show{display:block;}
.footer{text-align:center;padding:40px 20px 24px;}
.footer-deco{font-size:16px;color:#90be6d;opacity:0.38;letter-spacing:8px;margin-bottom:18px;}
.footer-dedication{font-family:'ZCOOL XiaoWei',serif;font-size:16px;color:#3a8a6a;letter-spacing:0.45em;line-height:2.6;margin-bottom:26px;}
.footer-brand-zh{font-family:'ZCOOL XiaoWei',serif;font-size:13px;color:#6a4c1e;letter-spacing:0.25em;opacity:0.7;}
.footer-brand-en{font-size:11px;color:#8a6a2e;letter-spacing:0.2em;font-weight:300;opacity:0.6;margin-top:5px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

  <button class="submit-btn" id="submitBtn" onclick="submitBlessing()">送出祝福 🌸</button>
  <div class="success-toast" id="successToast">✨ 祝福已送出，愿光明遍照十方</div>
  <div class="error-msg" id="errorMsg">提交遇到问题，请稍后再试</div>
</div>

<!-- 底部 -->
<div class="footer">
  <div class="footer-deco">· · ·</div>
  <div class="footer-dedication">愿以此功德　普及于一切<br>我等与众生　皆共成佛道</div>
  <div class="footer-deco">· · ·</div>
  <div class="footer-brand-zh">廣慧本淨</div>
  <div class="footer-brand-en">Origin of Radiant Awareness</div>
</div>

</div>

<script>
const APP_ID = 'cli_aa87ff883c395bb3';
const APP_SECRET = 'cZ64lKDenbrRHsmqeDToVjscYPqpiFup';
const APP_TOKEN = 'RuKvb6O7QaPhZGs4TIbcQ7hJnHc';
const TABLE_ID = 'tblPnb39T1rqy5jY';

let accessToken = '';

async function getToken() {
  if (accessToken) return accessToken;
  try {
    const res = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({app_id: APP_ID, app_secret: APP_SECRET})
    });
    const data = await res.json();
    accessToken = data.tenant_access_token;
    return accessToken;
  } catch(e) {
    console.error('获取token失败', e);
    return null;
  }
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  if (isToday) return '今天 ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  return (d.getMonth()+1) + '月' + d.getDate() + '日';
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pinSvg(color, lineColor) {
  return `<svg class="pin" viewBox="0 0 24 24"><circle cx="12" cy="11" r="8" fill="${color}" stroke="${lineColor}" stroke-width="1.5"/><circle cx="10" cy="9" r="2.4" fill="rgba(255,255,255,0.65)"/><line x1="12" y1="19" x2="12" y2="24" stroke="#c8962a" stroke-width="1.4" stroke-linecap="round"/></svg>`;
}

const pins = [
  pinSvg('rgba(244,132,95,0.22)','#f4845f'),
  pinSvg('rgba(144,190,109,0.22)','#90be6d'),
  pinSvg('rgba(249,199,79,0.26)','#f9c74f')
];

async function loadBlessings() {
  try {
    const token = await getToken();
    if (!token) throw new Error('no token');
    const res = await fetch(
      `https://open.feishu.cn/open-apis/bitable/v1/apps/${APP_TOKEN}/tables/${TABLE_ID}/records?page_size=50`,
      {headers: {'Authorization': 'Bearer ' + token}}
    );
    const data = await res.json();
    const records = (data.data?.items || []).reverse();
    renderBlessings(records);
    calcStats(records);
  } catch(e) {
    document.getElementById('blessingList').innerHTML = '<div class="loading-text">暂无祝福，来第一个留下心愿吧 🌸</div>';
    updateStats(0,0,0);
  }
}

function renderBlessings(records) {
  const list = document.getElementById('blessingList');
  if (!records.length) {
    list.innerHTML = '<div class="loading-text">暂无祝福，来第一个留下心愿吧 🌸</div>';
    return;
  }
  list.innerHTML = records.map((r, i) => {
    const f = r.fields;
    const name = f['昵称'] || '匿名行者';
    const content = f['祝福内容'] || '';
    const toWho = f['送给谁'] || '';
    const ts = f['提交时间'] || Date.now();
    const tags = toWho.split('、').filter(Boolean);
    const n = i % 3;
    const tagClass = ['bless-card-tag-0','bless-card-tag-1','bless-card-tag-2'][n];
    return `<div class="bless-card" style="--n:${n}">
      ${pins[n]}
      <div class="card-top"><span class="card-name">${esc(name)}</span><span class="card-time">${formatTime(ts)}</span></div>
      <div class="card-body">${esc(content)}</div>
      ${tags.length ? '<div class="card-tags">'+tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')+'</div>' : ''}
    </div>`;
  }).join('');
}

function calcStats(records) {
  const today = new Date().toDateString();
  const todayCount = records.filter(r => {
    const ts = r.fields['提交时间'];
    return ts && new Date(ts).toDateString() === today;
  }).length;
  const names = new Set(records.map(r => r.fields['昵称'] || '匿名').filter(Boolean));
  updateStats(todayCount, records.length, names.size);
}

function updateStats(today, total, participants) {
  document.getElementById('todayCount').textContent = today;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('participantCount').textContent = participants;
}

async function submitBlessing() {
  const nickname = document.getElementById('nicknameInput').value.trim() || '匿名行者';
  const content = document.getElementById('contentInput').value.trim();
  if (!content) { document.getElementById('contentInput').focus(); return; }

  const checked = [...document.querySelectorAll('.tag-cb:checked')].map(el => {
    if (el.id === 't7') return document.getElementById('otherInput').value.trim() || '其他';
    return el.nextElementSibling.textContent;
  });
  const toWho = checked.join('、') || '';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中…';

  try {
    const token = await getToken();
    if (!token) throw new Error('no token');
    const res = await fetch(
      `https://open.feishu.cn/open-apis/bitable/v1/apps/${APP_TOKEN}/tables/${TABLE_ID}/records`,
      {
        method: 'POST',
        headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
        body: JSON.stringify({fields: {'昵称': nickname, '祝福内容': content, '送给谁': toWho, '提交时间': Date.now()}})
      }
    );
    const result = await res.json();
    if (result.code !== 0) throw new Error(result.msg);
    resetForm();
    showSuccess();
    await loadBlessings();
  } catch(e) {
    document.getElementById('errorMsg').classList.add('show');
    setTimeout(() => document.getElementById('errorMsg').classList.remove('show'), 3000);
  } finally {
    btn.disabled = false;
    btn.textContent = '送出祝福 🌸';
  }
}

function resetForm() {
  document.getElementById('nicknameInput').value = '';
  document.getElementById('contentInput').value = '';
  document.getElementById('otherInput').value = '';
  document.querySelectorAll('.tag-cb:checked').forEach(el => el.checked = false);
  document.getElementById('otherInput').classList.remove('show');
}

function showSuccess() {
  const t = document.getElementById('successToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('t7').addEventListener('change', function() {
  document.getElementById('otherInput').classList.toggle('show', this.checked);
});

loadBlessings();
</script>
</body>
</html>
